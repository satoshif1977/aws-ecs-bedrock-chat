name: CI Check

on:
  push:
    branches:
      - master

jobs:
  ci:
    name: Lint & Docker Build
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint tools
        run: pip install ruff black

      - name: ruff（構文チェック）
        run: ruff check app/

      - name: black（フォーマットチェック）
        run: black --check app/

      - name: Docker Build Check
        run: docker build -t bedrock-chat:ci .
