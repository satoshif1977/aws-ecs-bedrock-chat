name: CI Check

on:
  push:
    branches:
      - master

jobs:
  ci:
    name: Lint & Docker Build
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint tools & test deps
        run: pip install ruff black pytest boto3 pytest-cov

      - name: ruff（構文チェック）
        run: ruff check app/

      - name: black（フォーマットチェック）
        run: black --check app/

      - name: pytest（ユニットテスト）
        run: pytest app/test_app.py -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: app
          fail_ci_if_error: false

      - name: Docker Build Check
        run: docker build -t bedrock-chat:ci .
